name: vocal_assistant
description: Assistant vocal Android offline - Appels, SMS, WhatsApp, Réveil, Voiture
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Reconnaissance vocale OFFLINE ──────────────────────────
  vosk_flutter: ^0.3.48

  # ── Synthèse vocale OFFLINE ────────────────────────────────
  flutter_tts: ^3.8.5

  # ── Téléphone & Appels + WhatsApp ─────────────────────────
  phone_state: ^2.0.0
  url_launcher: ^6.2.5

  # ── Répertoire / Contacts ──────────────────────────────────
  flutter_contacts: ^1.1.9+1

  # ── Permissions ────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Base de données SQL OFFLINE ────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Gestion d'état ─────────────────────────────────────────
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # ── Injection de dépendances ───────────────────────────────
  get_it: ^7.7.0

  # ── SMS ────────────────────────────────────────────────────
  flutter_sms: ^2.3.2

  # ── Réveil / Minuterie ─────────────────────────────────────
  flutter_local_notifications: ^17.2.2
  android_alarm_manager_plus: ^3.0.4
  timezone: ^0.9.4

  # ── Service arrière-plan ───────────────────────────────────
  flutter_foreground_task: ^8.8.0
  connectivity_plus: ^6.0.3

  # ── Mode voiture ───────────────────────────────────────────
  wakelock_plus: ^1.2.8
  screen_brightness: ^1.0.1

  # ── UI ─────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  mockito: ^5.4.4
  bloc_test: ^9.1.7

# ── Résolution du conflit vosk_flutter <> permission_handler ─
dependency_overrides:
  permission_handler: ^11.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/animations/
    - assets/sounds/
