workflows:

  # ══════════════════════════════════════════════════════════
  # WORKFLOW 1 : DEBUG — déclenché à chaque push sur main
  # ══════════════════════════════════════════════════════════
  vocal-assistant-android:
    name: Vocal Assistant - APK Debug
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - android/.gradle

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Vérification Flutter
        script: flutter --version

      - name: Créer dossiers assets
        script: |
          mkdir -p assets/models assets/animations assets/fonts assets/sounds
          echo "Dossiers assets créés"

      - name: Télécharger modèles Vosk FR + EN
        script: |
          if [ ! -d assets/models/vosk-model-small-fr-0.22 ]; then
            wget -q https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip -O /tmp/vosk-fr.zip
            unzip -q /tmp/vosk-fr.zip -d assets/models/ && rm /tmp/vosk-fr.zip
          else
            echo "✅ Modèle FR en cache"
          fi
          if [ ! -d assets/models/vosk-model-small-en-us-0.15 ]; then
            wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -O /tmp/vosk-en.zip
            unzip -q /tmp/vosk-en.zip -d assets/models/ && rm /tmp/vosk-en.zip
          else
            echo "✅ Modèle EN en cache"
          fi
          ls -lh assets/models/

      - name: Flutter pub get
        script: flutter pub get

      - name: Configurer Gradle wrapper
        script: |
          flutter create --project-name wrapper_gen /tmp/flutter_wrapper_gen --no-pub --platforms android 2>/dev/null || true
          if [ -f /tmp/flutter_wrapper_gen/android/gradlew ]; then
            cp /tmp/flutter_wrapper_gen/android/gradlew android/gradlew
            mkdir -p android/gradle/wrapper
            cp /tmp/flutter_wrapper_gen/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
            echo "✅ Gradle wrapper configuré"
          fi

      - name: Nettoyer cache Gradle
        script: |
          rm -rf android/.gradle
          rm -rf ~/.gradle/caches/build-cache-*
          echo "✅ Cache Gradle nettoyé"

      - name: Analyse du code
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK Release
        script: |
          set -o pipefail
          flutter build apk --release --no-tree-shake-icons 2>&1 | tee /tmp/flutter_build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== ERREURS CLÉS ==="
            grep -E "error:|Error:|FAILED|Exception" /tmp/flutter_build.log | head -40
            exit $EXIT_CODE
          fi
          ls -lh build/app/outputs/flutter-apk/

      - name: Publier sur GitHub Releases
        script: |
          DATE=$(date +%Y%m%d-%H%M)
          SHORT_SHA=$(echo "$CM_COMMIT" | cut -c1-7)
          TAG="v${DATE}"
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          APK_NAME="JKAssistant-${TAG}-${SHORT_SHA}.apk"
          cp "$APK_PATH" "$APK_NAME"

          # Créer la release GitHub
          RELEASE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/kamdemjoseph06/JKAssistant-vocal-/releases" \
            -d "{
              \"tag_name\": \"$TAG\",
              \"name\": \"JKAssistant Vocal — $TAG\",
              \"body\": \"## 📱 Installation\\n1. Téléchargez le fichier **.apk** ci-dessous\\n2. Android : Paramètres → Sécurité → Sources inconnues → Activer\\n3. Installez le fichier\\n\\n## 🎙️ Utilisation sans toucher l'écran\\n- Dites **Hey Vocal** pour réveiller\\n- **Appelle Maurice** → appel direct automatique\\n- **WhatsApp à Jean je suis en route**\\n- **SMS à Marie j'arrive**\\n\\nCommit: $CM_COMMIT\",
              \"draft\": false,
              \"prerelease\": false,
              \"make_latest\": \"true\"
            }")
          RELEASE_ID=$(echo "$RELEASE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
          echo "Release créée: ID=$RELEASE_ID"

          # Uploader l'APK
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/kamdemjoseph06/JKAssistant-vocal-/releases/$RELEASE_ID/assets?name=$APK_NAME" \
            --data-binary "@$APK_NAME" | grep -o '"browser_download_url":"[^"]*"'

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - kamdemjoseph06@gmail.com
        notify:
          success: true
          failure: true

  # ══════════════════════════════════════════════════════════
  # WORKFLOW 2 : RELEASE — déclenché manuellement ou sur tag
  # ══════════════════════════════════════════════════════════
  vocal-assistant-release:
    name: Vocal Assistant - APK Release (signé)
    max_build_duration: 90

    environment:
      flutter: stable
      java: 17
      vars:
        CM_KEYSTORE_PATH: /tmp/keystore.jks
      groups:
        - jkassistant_signing

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
        - android/.gradle

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
          include: true

    scripts:

      - name: Vérification Flutter
        script: flutter --version

      - name: Créer dossiers assets
        script: |
          mkdir -p assets/models assets/animations assets/fonts assets/sounds

      - name: Télécharger modèles Vosk FR + EN
        script: |
          if [ ! -d assets/models/vosk-model-small-fr-0.22 ]; then
            wget -q https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip -O /tmp/vosk-fr.zip
            unzip -q /tmp/vosk-fr.zip -d assets/models/ && rm /tmp/vosk-fr.zip
          else
            echo "✅ Modèle FR en cache"
          fi
          if [ ! -d assets/models/vosk-model-small-en-us-0.15 ]; then
            wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -O /tmp/vosk-en.zip
            unzip -q /tmp/vosk-en.zip -d assets/models/ && rm /tmp/vosk-en.zip
          else
            echo "✅ Modèle EN en cache"
          fi

      - name: Flutter pub get
        script: flutter pub get

      - name: Configurer Gradle wrapper
        script: |
          flutter create --project-name wrapper_gen /tmp/flutter_wrapper_gen --no-pub --platforms android 2>/dev/null || true
          if [ -f /tmp/flutter_wrapper_gen/android/gradlew ]; then
            cp /tmp/flutter_wrapper_gen/android/gradlew android/gradlew
            mkdir -p android/gradle/wrapper
            cp /tmp/flutter_wrapper_gen/android/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
          fi

      - name: Décoder le keystore et créer key.properties
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > $CM_KEYSTORE_PATH
          cat > android/key.properties <<EOF
          storePassword=$CM_KEYSTORE_PASS
          keyPassword=$CM_KEY_PASS
          keyAlias=$CM_KEY_ALIAS
          storeFile=$CM_KEYSTORE_PATH
          EOF
          echo "✅ Keystore décodé et key.properties créé"

      - name: Analyse du code
        script: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK Release signé
        script: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --build-name=$CM_TAG \
            --build-number=$BUILD_NUMBER
          ls -lh build/app/outputs/flutter-apk/

      - name: Vérification signature APK
        script: |
          jarsigner -verify -verbose -certs \
            build/app/outputs/flutter-apk/app-release.apk
          echo "✅ Signature valide"

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - kamdemjoseph06@gmail.com
        notify:
          success: true
          failure: true
