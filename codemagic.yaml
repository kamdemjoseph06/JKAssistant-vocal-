workflows:

  vocal-assistant-android:
    name: Vocal Assistant - APK Android
    max_build_duration: 60

    environment:
      flutter: stable
      java: 17

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:

      - name: Vérification Flutter
        script: |
          flutter --version

      - name: Créer dossiers assets
        script: |
          mkdir -p assets/models
          mkdir -p assets/animations
          mkdir -p assets/fonts
          mkdir -p assets/sounds
          echo "Dossiers assets créés"

      - name: Télécharger modèles Vosk FR + EN
        script: |
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip \
               -O /tmp/vosk-fr.zip
          unzip -q /tmp/vosk-fr.zip -d assets/models/
          rm /tmp/vosk-fr.zip
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip \
               -O /tmp/vosk-en.zip
          unzip -q /tmp/vosk-en.zip -d assets/models/
          rm /tmp/vosk-en.zip
          ls -lh assets/models/

      - name: Flutter pub get
        script: |
          flutter pub get

      - name: Configurer Gradle wrapper (gradlew + jar)
        script: |
          # Générer gradlew et gradle-wrapper.jar via un projet Flutter temporaire
          flutter create --project-name wrapper_gen /tmp/flutter_wrapper_gen \
            --no-pub --platforms android 2>/dev/null || true

          # Copier gradlew et gradle-wrapper.jar depuis le projet temporaire
          if [ -f /tmp/flutter_wrapper_gen/android/gradlew ]; then
            cp /tmp/flutter_wrapper_gen/android/gradlew android/gradlew
            cp /tmp/flutter_wrapper_gen/android/gradlew.bat android/gradlew.bat 2>/dev/null || true
            mkdir -p android/gradle/wrapper
            cp /tmp/flutter_wrapper_gen/android/gradle/wrapper/gradle-wrapper.jar \
               android/gradle/wrapper/gradle-wrapper.jar
            chmod +x android/gradlew
            echo "✅ Gradle wrapper configuré depuis Flutter template"
          else
            echo "⚠️  Fallback: téléchargement direct gradle-wrapper.jar"
            mkdir -p android/gradle/wrapper
            curl -fsSL "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" \
                 -o android/gradle/wrapper/gradle-wrapper.jar
            # Créer gradlew minimal
            cat > android/gradlew << 'GRADLEW'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec java -jar "$SCRIPT_DIR/gradle/wrapper/gradle-wrapper.jar" "$@"
          GRADLEW
            chmod +x android/gradlew
          fi
          ls -lh android/gradlew android/gradle/wrapper/gradle-wrapper.jar

      - name: Générer fichiers Drift (build_runner)
        script: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyse du code
        script: |
          flutter analyze --no-fatal-infos

      - name: Build APK Debug
        script: |
          flutter build apk --debug --verbose
          ls -lh build/app/outputs/flutter-apk/

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
      - build/app/outputs/flutter-apk/*.apk

    publishing:
      email:
        recipients:
          - kamdemjoseph06@gmail.com
        notify:
          success: true
          failure: true
