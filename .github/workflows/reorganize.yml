name: Reorganize Flutter Structure

on:
  workflow_dispatch:  # Bouton "Run workflow" manuel

  jobs:
    reorganize:
        runs-on: ubuntu-latest
            steps:
                  - uses: actions/checkout@v4
                          with:
                                    fetch-depth: 0

                                          - name: Réorganiser la structure des dossiers
                                                  run: |
                                                            mkdir -p lib/core/voice
                                                                      mkdir -p lib/core/services
                                                                                mkdir -p lib/data/database/tables
                                                                                          mkdir -p lib/data/database/daos
                                                                                                    mkdir -p lib/data/repositories
                                                                                                              mkdir -p lib/domain/usecases
                                                                                                                        mkdir -p lib/presentation/screens
                                                                                                                                  mkdir -p lib/presentation/blocs
                                                                                                                                            mkdir -p lib/presentation/widgets
                                                                                                                                                      mkdir -p test
                                                                                                                                                                mkdir -p docs
                                                                                                                                                                          mkdir -p android/app/src/main
                                                                                                                                                                                    mkdir -p assets/models
                                                                                                                                                                                              mkdir -p assets/animations
                                                                                                                                                                                                        mkdir -p assets/fonts

                                                                                                                                                                                                                  mv -v voice_recognizer.dart lib/core/voice/ 2>/dev/null || true
                                                                                                                                                                                                                            mv -v voice_synthesizer.dart lib/core/voice/ 2>/dev/null || true
                                                                                                                                                                                                                                      mv -v command_parser.dart lib/core/voice/ 2>/dev/null || true
                                                                                                                                                                                                                                                mv -v intent_recognizer.dart lib/core/voice/ 2>/dev/null || true

                                                                                                                                                                                                                                                          mv -v sms_service.dart lib/core/services/ 2>/dev/null || true
                                                                                                                                                                                                                                                                    mv -v whatsapp_service.dart lib/core/services/ 2>/dev/null || true
                                                                                                                                                                                                                                                                              mv -v alarm_service.dart lib/core/services/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                        mv -v hotword_service.dart lib/core/services/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                  mv -v car_mode_service.dart lib/core/services/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                            mv -v app_database.dart lib/data/database/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                      mv -v call_history_table.dart lib/data/database/tables/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                mv -v contacts_cache_table.dart lib/data/database/tables/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                          mv -v call_history_dao.dart lib/data/database/daos/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                    mv -v contacts_dao.dart lib/data/database/daos/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                              mv -v contact_repository.dart lib/data/repositories/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                        mv -v call_repository.dart lib/data/repositories/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                  mv -v call_usecases.dart lib/domain/usecases/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                            mv -v home_screen.dart lib/presentation/screens/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                      mv -v voice_bloc.dart lib/presentation/blocs/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                mv -v mic_button.dart lib/presentation/widgets/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                          mv -v confirmation_dialog.dart lib/presentation/widgets/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                                                                    mv -v main.dart lib/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                                              mv -v service_locator.dart lib/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                                                                                        mv -v nlu_test.dart test/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                                                                                                  mv -v ERRORS_LOG.md docs/ 2>/dev/null || true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            mv -v GUIDE_CODEMAGIC.md docs/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      mv -v AndroidManifest.xml android/app/src/main/ 2>/dev/null || true

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                echo "✅ Structure réorganisée"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          find lib -name "*.dart" | sort

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Commit et push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      git add -A
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git commit -m "🤖 Réorganisation automatique structure Flutter" || echo "Rien à commit"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git push
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          