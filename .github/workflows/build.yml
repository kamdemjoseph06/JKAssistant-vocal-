name: Build APK Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true
      - run: mkdir -p assets/models assets/animations assets/fonts assets/sounds
      - name: Download Vosk FR
        run: |
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip -O /tmp/vosk-fr.zip
          unzip -q /tmp/vosk-fr.zip -d assets/models/ && rm /tmp/vosk-fr.zip
      - name: Download Vosk EN
        run: |
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -O /tmp/vosk-en.zip
          unzip -q /tmp/vosk-en.zip -d assets/models/ && rm /tmp/vosk-en.zip
      - run: flutter pub get
      - run: flutter pub run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: JKAssistant-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
