name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: stable
          cache: true

      - name: Préparer les dossiers assets
        run: mkdir -p assets/models assets/animations assets/fonts assets/sounds

      - name: Télécharger modèle Vosk FR
        run: |
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-fr-0.22.zip -O /tmp/vosk-fr.zip
          unzip -q /tmp/vosk-fr.zip -d assets/models/ && rm /tmp/vosk-fr.zip

      - name: Télécharger modèle Vosk EN
        run: |
          wget -q https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip -O /tmp/vosk-en.zip
          unzip -q /tmp/vosk-en.zip -d assets/models/ && rm /tmp/vosk-en.zip

      - run: flutter pub get

      - run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Compiler APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Nommer l'APK
        id: apk_info
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NAME="JKAssistant-v${DATE}-${SHA}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$NAME"
          echo "apk_name=$NAME" >> $GITHUB_OUTPUT
          echo "tag=v${DATE}" >> $GITHUB_OUTPUT

      - name: Créer GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk_info.outputs.tag }}
          name: "JKAssistant Vocal — ${{ steps.apk_info.outputs.tag }}"
          body: |
            ## 📱 Installation
            1. Téléchargez le fichier **.apk** ci-dessous
            2. Android : **Paramètres → Sécurité → Sources inconnues** → Activer
            3. Ouvrez le fichier et installez

            ## 🎙️ Utilisation sans toucher l'écran
            - Dites **"Hey Vocal"** pour réveiller l'assistant
            - **"Appelle Maurice"** → appel direct automatique
            - **"Envoie un WhatsApp à Jean je suis en route"**
            - **"SMS à Marie j'arrive dans 10 minutes"**
            - **"Oui"** ou **"Non"** pour confirmer à voix haute

            Commit : `${{ github.sha }}`
          files: ${{ steps.apk_info.outputs.apk_name }}
          make_latest: true
